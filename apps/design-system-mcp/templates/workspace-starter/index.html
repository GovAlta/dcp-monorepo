<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoA Workspace App</title>
    <!-- Required: Ionicons CDN for GoA icons to render -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <!-- Wireframe Theme CSS -->
    <link rel="stylesheet" href="/wireframe-theme.css">
    <style>
      /* Wireframe mode toggle - fixed position */
      .wireframe-toggle {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 10000;
        background: #fff;
        border: 2px solid #333;
        border-radius: 4px;
        padding: 8px 12px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }
      .wireframe-toggle input {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .wireframe-toggle:hover {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Wireframe mode: Toggle with Cmd+. (Ctrl+. on Windows) or click the tab -->
    <script>
      // Keyboard shortcut
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === '.') {
          e.preventDefault();
          const isWireframe = document.documentElement.dataset.fidelity === 'wireframe';
          document.documentElement.dataset.fidelity = isWireframe ? '' : 'wireframe';
        }
      });

      // Clickable overlay for the vertical wireframe tab
      const toggle = document.createElement('div');
      toggle.id = 'wireframe-toggle-overlay';
      toggle.style.cssText = `
        position: fixed; right: 0; top: 50%; transform: translateY(-50%);
        width: 28px; height: 140px; z-index: 100000; cursor: pointer;
      `;
      toggle.title = 'Toggle wireframe mode';
      toggle.onclick = () => {
        const root = document.documentElement;
        root.dataset.fidelity = root.dataset.fidelity === 'wireframe' ? '' : 'wireframe';
      };
      document.body.appendChild(toggle);
    </script>
  </body>
</html>
