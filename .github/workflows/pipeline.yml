# GitHub Actions pipeline.
# This pipeline runs application build process in GitHub Actions but runs OpenShift BuildConfig for
# creating runtime containers. It does not require a container registry accessible to both OpenShift
# and GitHub.
#
# Triggered automatically on push to main (merge) and pull requests. Only affected apps are built
# and deployed, determined via nx affected.
#
# Secrets (to be manually added):
# OPENSHIFT_SERVER  - URL to the OpenShift server.
# OPENSHIFT_TOKEN   - Token for the service account (github-actions) used for OC cli commands.
#
# Envs (auto added but requires manual configuration):
# Dev, Test, Staging, Prod
name: Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      AFFECTED_BASE:
        description: Value for --base= in nx affected commands
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    outputs:
      affected_apps_array: ${{ steps.set_outputs.outputs.affected_apps_array }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci

      # Determine the last successful build of this (pipeline.yml) workflow and set it as the AFFECTED_BASE.
      - name: Get last successful commit
        id: last_successful_commit
        uses: nrwl/nx-set-shas@v4

      # Project build steps lint, check, and build
      - name: Lint
        run: npx nx affected --target=lint --base=${{ github.event.inputs.AFFECTED_BASE || steps.last_successful_commit.outputs.base }} --parallel
      - name: Check
        run: npx nx affected --target=check --base=${{ github.event.inputs.AFFECTED_BASE || steps.last_successful_commit.outputs.base }} --parallel
      - name: Build
        run: npx nx affected --target=buildcustom --base=${{ github.event.inputs.AFFECTED_BASE || steps.last_successful_commit.outputs.base }} --configuration production

      # Determine affected deployable apps (those with OpenShift manifests).
      # Must run BEFORE npm prune so that nx is still available.
      - id: set_outputs
        name: Set affected deployable apps
        run: |
          ALL_AFFECTED=$(npx nx show projects --affected --type=app --sep=, --base=${{ github.event.inputs.AFFECTED_BASE || steps.last_successful_commit.outputs.base }})
          DEPLOYABLE=""
          if [ -n "$ALL_AFFECTED" ]; then
            IFS=',' read -ra APPS <<< "$ALL_AFFECTED"
            for app in "${APPS[@]}"; do
              if [ -f ".openshift/$app/$app.yml" ]; then
                if [ -n "$DEPLOYABLE" ]; then
                  DEPLOYABLE="$DEPLOYABLE,$app"
                else
                  DEPLOYABLE="$app"
                fi
              fi
            done
          fi
          echo "affected_apps_array=$(echo "$DEPLOYABLE" | jq -Rc 'split(",") | if . == [""] then [] else . end')" >> $GITHUB_OUTPUT

      - run: npm prune --omit=dev

  buildContainers:
    runs-on: ubuntu-24.04
    needs: build
    if: needs.build.outputs.affected_apps_array != '[]' && github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Build app
        run: npx nx run ${{ matrix.app }}:buildcustom --configuration production
      - run: npm prune --omit=dev
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: '4'
      - name: OC login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: dcp-build
          insecure_skip_tls_verify: true
      - name: Build container
        run: |
          oc process -f .openshift/${{ matrix.app }}/${{ matrix.app }}.yml -p PROJECT=dcp-build | oc apply -l apply-build=true -f -
          oc start-build ${{ matrix.app }} --from-dir . --follow --wait

  ocDryRun:
    runs-on: ubuntu-24.04
    needs: build
    # Only trigger dry run on PR events.
    if: github.event_name == 'pull_request' && needs.build.outputs.affected_apps_array != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: '4'
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: dcp-build
          insecure_skip_tls_verify: true
      - run: oc project dcp-dev
      - name: Apply Manifests (dry-run)
        run: |
          oc process -f .openshift/${{ matrix.app }}/${{ matrix.app }}.yml -p PROJECT=dcp-dev -p DEPLOY_TAG=dev | oc apply --dry-run='server' -f -

  deployDev:
    runs-on: ubuntu-24.04
    needs: [build, buildContainers]
    # Don't trigger deployment on PR events.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    environment:
      name: Dev
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: '4'
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: dcp-build
          insecure_skip_tls_verify: true
      - name: Tag Dev
        run: oc tag ${{ matrix.app }}:latest ${{ matrix.app }}:dev
      - run: oc project dcp-dev
      - name: Apply Manifests
        run: |
          oc process -f .openshift/${{ matrix.app }}/${{ matrix.app }}.yml -p PROJECT=dcp-dev -p DEPLOY_TAG=dev | oc apply -f -
      - name: Deploy Dev
        run: |
          oc rollout latest dc/${{ matrix.app }}
          oc rollout status dc/${{ matrix.app }}

  # Approval gate so matrix items don't each require individual approval.
  deployStagingApproval:
    runs-on: ubuntu-24.04
    needs: [build, deployDev]
    if: github.event_name != 'pull_request'
    environment:
      name: Test-gate
    steps:
      - run: echo "Staging deployment approved"

  deployStaging:
    runs-on: ubuntu-24.04
    needs: [build, deployStagingApproval]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    environment:
      name: Test
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: '4'
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: dcp-build
          insecure_skip_tls_verify: true
      - name: Tag Test
        run: oc tag ${{ matrix.app }}:dev ${{ matrix.app }}:test
      - run: oc project dcp-uat
      - name: Apply Manifests
        run: |
          oc process -f .openshift/${{ matrix.app }}/${{ matrix.app }}.yml -p PROJECT=dcp-uat -p DEPLOY_TAG=test | oc apply -f -
      - name: Deploy Test
        run: |
          oc rollout latest dc/${{ matrix.app }}
          oc rollout status dc/${{ matrix.app }}

  deployProdApproval:
    runs-on: ubuntu-24.04
    needs: [build, deployStaging]
    if: github.event_name != 'pull_request'
    environment:
      name: Prod-gate
    steps:
      - run: echo "Production deployment approved"

  deployProd:
    runs-on: ubuntu-24.04
    needs: [build, deployProdApproval]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    environment:
      name: Prod
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: '4'
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: dcp-build
          insecure_skip_tls_verify: true
      - name: Tag Prod
        run: oc tag ${{ matrix.app }}:test ${{ matrix.app }}:prod
      - run: oc project dcp-prod
      - name: Apply Manifests
        run: |
          oc process -f .openshift/${{ matrix.app }}/${{ matrix.app }}.yml -p PROJECT=dcp-prod -p DEPLOY_TAG=prod | oc apply -f -
      - name: Deploy Prod
        run: |
          oc rollout latest dc/${{ matrix.app }}
          oc rollout status dc/${{ matrix.app }}